<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator — Scientific Mode + History</title>
    <meta name="description" content="Premium dark calculator with scientific functions, calculation history, and full keyboard support. Free to embed." />
    <meta property="og:title"       content="Calculator — Scientific Mode + History" />
    <meta property="og:description" content="Premium dark calculator with scientific functions, calculation history, and full keyboard support. Free to embed." />
    <meta property="og:image"       content="https://umairjailani.github.io/Calculator_Project/preview.png" />
    <meta property="og:url"         content="https://umairjailani.github.io/Calculator_Project/" />
    <meta property="og:type"        content="website" />
    <meta name="twitter:card"       content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="cal.css" />
  </head>
  <body>
    <div class="calc" id="calc">

      <!-- Top bar -->
      <div class="top-bar">
        <button class="top-btn" id="sciBtn" title="Scientific mode">f(x)</button>
        <div class="dr-toggle" id="drToggle">
          <button class="dr-btn active" id="degBtn">DEG</button>
          <button class="dr-btn" id="radBtn">RAD</button>
        </div>
        <button class="top-btn" id="histBtn" title="History">⏱</button>
      </div>

      <!-- Display -->
      <div class="display" id="display" title="Click to copy">
        <div class="expr"   id="expr">&nbsp;</div>
        <div class="result" id="result">0</div>
        <div class="copy-toast" id="copyToast">Copied!</div>
      </div>

      <!-- Scientific rows (hidden until toggled) -->
      <div class="sci-buttons" id="sciButtons">
        <button class="btn btn-sci" data-action="sci" data-fn="sin">sin</button>
        <button class="btn btn-sci" data-action="sci" data-fn="cos">cos</button>
        <button class="btn btn-sci" data-action="sci" data-fn="tan">tan</button>
        <button class="btn btn-sci" data-action="sci" data-fn="sqrt">√x</button>

        <button class="btn btn-sci" data-action="sci" data-fn="sq">x²</button>
        <button class="btn btn-sci" data-action="sci" data-fn="cube">x³</button>
        <button class="btn btn-sci" data-action="sci" data-fn="inv">1/x</button>
        <button class="btn btn-sci" data-action="sci" data-fn="log">log</button>

        <button class="btn btn-sci" data-action="sci" data-fn="ln">ln</button>
        <button class="btn btn-sci" data-action="sci" data-fn="abs">|x|</button>
        <button class="btn btn-sci" data-action="const" data-val="pi">π</button>
        <button class="btn btn-sci" data-action="const" data-val="e">e</button>
      </div>

      <!-- Standard buttons -->
      <div class="buttons">
        <button class="btn btn-fn"  data-action="clear">AC</button>
        <button class="btn btn-fn"  data-action="sign">+/−</button>
        <button class="btn btn-fn"  data-action="percent">%</button>
        <button class="btn btn-op"  data-action="op" data-op="/">÷</button>

        <button class="btn btn-num" data-action="digit" data-val="7">7</button>
        <button class="btn btn-num" data-action="digit" data-val="8">8</button>
        <button class="btn btn-num" data-action="digit" data-val="9">9</button>
        <button class="btn btn-op"  data-action="op" data-op="*">×</button>

        <button class="btn btn-num" data-action="digit" data-val="4">4</button>
        <button class="btn btn-num" data-action="digit" data-val="5">5</button>
        <button class="btn btn-num" data-action="digit" data-val="6">6</button>
        <button class="btn btn-op"  data-action="op" data-op="-">−</button>

        <button class="btn btn-num" data-action="digit" data-val="1">1</button>
        <button class="btn btn-num" data-action="digit" data-val="2">2</button>
        <button class="btn btn-num" data-action="digit" data-val="3">3</button>
        <button class="btn btn-op"  data-action="op" data-op="+">+</button>

        <button class="btn btn-num btn-zero" data-action="digit" data-val="0">0</button>
        <button class="btn btn-num" data-action="decimal">.</button>
        <button class="btn btn-eq"  data-action="equals">=</button>
      </div>

      <!-- Keyboard hint -->
      <div class="kbd-hint">Enter = &nbsp;·&nbsp; Esc clear &nbsp;·&nbsp; ← delete &nbsp;·&nbsp; keyboard supported</div>

      <!-- History panel (slides up over buttons) -->
      <div class="hist-panel" id="histPanel">
        <div class="hist-header">
          <button id="histBackBtn" title="Close">←</button>
          <span>History</span>
          <button id="clearHistBtn">Clear all</button>
        </div>
        <div class="hist-list" id="histList"></div>
        <div class="hist-empty" id="histEmpty">No calculations yet</div>
      </div>

    </div>
    <script src="cal.js"></script>
  </body>
</html>
